<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 ZA-80 Multi-Colosseum Dashboard</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-gold: #ffd700;
            --accent-fire: #ff6b35;
            --accent-blue: #4a9eff;
            --accent-green: #00ff88;
            --accent-purple: #a855f7;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border-color: #2a2a3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-fire));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 1.2em;
        }

        .totals {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .total-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .total-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(255, 107, 53, 0.2);
        }

        .total-card .value {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .total-card .label {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .domains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .domain-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        .domain-card:hover {
            transform: translateY(-2px);
        }

        .domain-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .domain-name {
            font-size: 1.3em;
            font-weight: 600;
        }

        .domain-status {
            display: flex;
            gap: 10px;
        }

        .domain-stat {
            background: var(--bg-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85em;
        }

        .leaderboard {
            margin-bottom: 20px;
        }

        .leaderboard h4 {
            color: var(--text-secondary);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .leader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .leader.gold {
            border-left: 3px solid var(--accent-gold);
        }

        .leader.silver {
            border-left: 3px solid #c0c0c0;
        }

        .leader.bronze {
            border-left: 3px solid #cd7f32;
        }

        .leader-name {
            font-weight: 500;
        }

        .leader-score {
            color: var(--accent-green);
            font-weight: 600;
        }

        .leader-meta {
            color: var(--text-secondary);
            font-size: 0.85em;
        }

        .recent-rounds h4 {
            color: var(--text-secondary);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .round {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9em;
        }

        .round:last-child {
            border-bottom: none;
        }

        .round-winner {
            color: var(--accent-blue);
        }

        .round-tier {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            text-transform: uppercase;
        }

        .round-tier.bronze { background: #cd7f3233; color: #cd7f32; }
        .round-tier.silver { background: #c0c0c033; color: #c0c0c0; }
        .round-tier.gold { background: #ffd70033; color: var(--accent-gold); }
        .round-tier.platinum { background: #a855f733; color: var(--accent-purple); }

        .timestamp {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 30px;
            font-size: 0.9em;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2em;
            color: var(--text-secondary);
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--accent-fire), var(--accent-gold));
            color: var(--bg-primary);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 107, 53, 0.4);
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 ZA-80 Multi-Colosseum</h1>
        <div class="subtitle">
            <span class="live-indicator"></span>
            10 Domain Colosseums Evolving in Parallel — 20%^10 = 1,000,000x
        </div>
    </div>

    <div class="totals" id="totals">
        <div class="total-card">
            <div class="value" id="total-domains">10</div>
            <div class="label">Active Domains</div>
        </div>
        <div class="total-card">
            <div class="value" id="total-beings">—</div>
            <div class="label">Total Beings</div>
        </div>
        <div class="total-card">
            <div class="value" id="total-rounds">—</div>
            <div class="label">Total Rounds</div>
        </div>
        <div class="total-card">
            <div class="value" id="total-evolutions">—</div>
            <div class="label">Evolutions</div>
        </div>
    </div>

    <div class="domains-grid" id="domains-grid">
        <div class="loading">Loading domain data...</div>
    </div>

    <div class="timestamp" id="timestamp">Last updated: —</div>

    <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>

    <script>
        const STATS_URL = '/multi_colosseum_stats.json';
        
        const domainIcons = {
            strategy: '♟️',
            marketing: '📣',
            sales: '🤝',
            tech: '⚙️',
            ops: '📋',
            cs: '💚',
            finance: '💰',
            hr: '👥',
            legal: '⚖️',
            product: '🎯'
        };

        async function loadData() {
            try {
                const response = await fetch(STATS_URL + '?t=' + Date.now());
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error('Failed to load stats:', error);
                document.getElementById('domains-grid').innerHTML = `
                    <div class="loading">
                        Unable to load data. Make sure the colosseum daemon is running.
                        <br><br>
                        Run: <code>python za80_multi_colosseum.py</code>
                    </div>
                `;
            }
        }

        function renderDashboard(data) {
            // Update totals
            document.getElementById('total-beings').textContent = data.totals?.total_beings || 0;
            document.getElementById('total-rounds').textContent = data.totals?.total_rounds || 0;
            document.getElementById('total-evolutions').textContent = data.totals?.total_evolutions || 0;
            document.getElementById('total-domains').textContent = Object.keys(data.domains || {}).length;
            
            // Update timestamp
            document.getElementById('timestamp').textContent = 
                `Last updated: ${new Date(data.timestamp).toLocaleString()}`;
            
            // Render domain cards
            const grid = document.getElementById('domains-grid');
            grid.innerHTML = '';
            
            for (const [key, domain] of Object.entries(data.domains || {})) {
                const card = document.createElement('div');
                card.className = 'domain-card';
                
                const leaderboardHtml = (domain.leaderboard || []).map((leader, i) => {
                    const rank = ['gold', 'silver', 'bronze'][i] || '';
                    return `
                        <div class="leader ${rank}">
                            <div>
                                <span class="leader-name">${leader.name}</span>
                                <span class="leader-meta">G${leader.generation || 0}</span>
                            </div>
                            <div>
                                <span class="leader-score">${(leader.avg_score || 0).toFixed(2)}</span>
                                <span class="leader-meta">${leader.wins || 0}W/${leader.losses || 0}L</span>
                            </div>
                        </div>
                    `;
                }).join('');
                
                const roundsHtml = (domain.recent_rounds || []).slice(0, 3).map(round => `
                    <div class="round">
                        <span class="round-winner">${round.winner_name}</span>
                        <span>
                            <span class="round-tier ${round.scenario_tier || 'bronze'}">${round.scenario_tier || '—'}</span>
                            ${(round.winner_score || 0).toFixed(2)}
                        </span>
                    </div>
                `).join('');
                
                card.innerHTML = `
                    <div class="domain-header">
                        <span class="domain-name">${domainIcons[key] || '🏛️'} ${domain.name}</span>
                        <div class="domain-status">
                            <span class="domain-stat">👥 ${domain.beings || 0}</span>
                            <span class="domain-stat">🎯 ${domain.rounds || 0}</span>
                        </div>
                    </div>
                    
                    <div class="leaderboard">
                        <h4>🏆 Leaderboard</h4>
                        ${leaderboardHtml || '<div style="color: var(--text-secondary)">No data yet</div>'}
                    </div>
                    
                    <div class="recent-rounds">
                        <h4>⚔️ Recent Battles</h4>
                        ${roundsHtml || '<div style="color: var(--text-secondary)">No battles yet</div>'}
                    </div>
                `;
                
                grid.appendChild(card);
            }
        }

        // Initial load
        loadData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
