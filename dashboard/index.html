<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>Sigil Control Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/css/variables.css">
  <link rel="stylesheet" href="/dashboard/css/layout.css">
  <link rel="stylesheet" href="/dashboard/css/components.css">
  <link rel="stylesheet" href="/dashboard/css/chat.css">
  <style>
    body { opacity: 0; transition: opacity 0.2s ease; }
    body.loaded { opacity: 1; }
  </style>
</head>
<body data-theme="dark">
  <div id="app" role="application" aria-label="Sigil Control Dashboard">
    <header id="header" role="banner"></header>
    <div id="alerts" role="alert" aria-live="polite"></div>
    <div id="main-layout">
      <main id="grid" role="main" aria-label="Dashboard panels">
        <section id="panel-health" class="panel span-4" aria-label="Health and metrics"></section>
        <section id="panel-adaptation" class="panel span-2" aria-label="Adaptation engine"></section>
        <section id="panel-memory" class="panel span-2" aria-label="Memory system"></section>
        <section id="panel-subagents" class="panel span-2" aria-label="Sub-agents"></section>
        <section id="panel-autonomy" class="panel span-2" aria-label="Autonomy controls"></section>
        <section id="panel-skills" class="panel span-2" aria-label="Skills and governance"></section>
        <section id="panel-telemetry" class="panel span-2" aria-label="Loop telemetry"></section>
        <section id="panel-activity" class="panel span-4" aria-label="Activity feed"></section>
      </main>
      <aside id="chat-sidebar" aria-label="Chat interface"></aside>
    </div>
  </div>
  <script type="module" src="/dashboard/js/app.js"></script>
</body>
</html>
